# @package _group_
train:
  # 1. Resize the original image to be large enough to support a 448 crop
  Resize:
    size: [512, 512] 
  
  # 2. Crop a 448x448 patch (Double your target ResNet input size)
  RandomResizedCrop:
    scale: [0.16, 1]
    ratio: [0.75, 1.33]
    size: 448  # <--- CHANGED: 224 * 2 = 448
    
  # 3. Apply Color Augmentation to the full 448px image
  ColorJitter:
    brightness: 0.4
    contrast: 0.4
    saturation: 0.4
  
  RandomHorizontalFlip:
    p: 0.5

  # 4. Convert to Tensor
  ToTensor: {}
  
  # 5. Normalize (Standard ImageNet stats apply to the RGB pixels)
  Normalize:
    mean: [0.485, 0.456, 0.406]
    std: [0.229, 0.224, 0.225]

  # 6. Decompose
  # Input: 448x448 RGB
  # Output: Four sub-bands, each 224x224 (Perfect for ResNet)
  CustomTransform:
    decompose_levels: 1
    basis: haar
    coarse_only: False # Assuming you want all 4 bands for multitask

test:
  # Same logic for test: Resize large -> Crop 448 -> Decompose -> Result 224
  Resize:
    size: [512, 512]
  CenterCrop:
    size: [448, 448] # <--- CHANGED to 448
  ToTensor: {}
  Normalize:
    mean: [0.485, 0.456, 0.406]
    std: [0.229, 0.224, 0.225]
  CustomTransform:
    decompose_levels: 1
    basis: haar
    coarse_only: False