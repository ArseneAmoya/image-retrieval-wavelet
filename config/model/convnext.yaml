  name: RetrievalNet
  freeze_batchnorm: false
  freeze_pos_emb: false
  kwargs:
    backbone_name: convnext
    bb_name: convnext_small   # Vous pouvez changer pour 'convnext_tiny' ou 'convnext_base'
